<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト管理カレンダー</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  margin: 0;
  background: #f5f6fa;
}

header {
  text-align: center;
  padding: 15px;
  background: #4a69bd;
  color: white;
  font-size: 20px;
  font-weight: bold;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: #4a69bd;
  color: white;
  font-size: 14px;
}

.shift-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin: 10px;
}

.shift-btn {
  padding: 10px;
  border-radius: 10px;
  font-weight: bold;
}

.day { background: #74b9ff; }
.night { background: #ff7675; }
.off { background: #55efc4; }
.late { background: #ffeaa7; }

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  padding: 10px;
}

.cell {
  background: white;
  border-radius: 10px;
  height: 70px;
  padding: 5px;
  font-size: 14px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  position: relative;
}

.date {
  font-size: 12px;
  color: #888;
}

.shift {
  font-size: 16px;
  font-weight: bold;
  margin-top: 5px;
}

.today {
  border: 2px solid #4a69bd;
}
</style>
</head>

<body>

<header id="title"></header>

<div class="controls">
  <button onclick="changeMonth(-1)">◀</button>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="shift-buttons">
  <button class="shift-btn day" onclick="setShift('日勤','day')">日勤</button>
  <button class="shift-btn night" onclick="setShift('夜勤','night')">夜勤</button>
  <button class="shift-btn off" onclick="setShift('休み','off')">休み</button>
  <button class="shift-btn late" onclick="setShift('遅番','late')">遅番</button>
  <button onclick="setShift('','')">消去</button>
</div>

<div class="calendar" id="calendar"></div>

<script>
let current = new Date();
let selectedShift = "";
let selectedClass = "";

function setShift(name, cls) {
  selectedShift = name;
  selectedClass = cls;
}

function changeMonth(num) {
  current.setMonth(current.getMonth() + num);
  render();
}

function render() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const year = current.getFullYear();
  const month = current.getMonth();

  document.getElementById("title").textContent =
    `${year}年 ${month + 1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    cal.appendChild(document.createElement("div"));
  }

  for (let d = 1; d <= lastDate; d++) {
    const cell = document.createElement("div");
    cell.className = "cell";

    const key = `${year}-${month}-${d}`;
    const saved = JSON.parse(localStorage.getItem(key) || "{}");

    const isToday =
      d === new Date().getDate() &&
      month === new Date().getMonth() &&
      year === new Date().getFullYear();

    if (isToday) cell.classList.add("today");

    cell.innerHTML = `
      <div class="date">${d}</div>
      <div class="shift ${saved.class || ""}">${saved.name || ""}</div>
    `;

    cell.onclick = () => {
      if (!selectedShift && !selectedClass) {
        localStorage.removeItem(key);
      } else {
        localStorage.setItem(key, JSON.stringify({
          name: selectedShift,
          class: selectedClass
        }));
      }
      render();
    };

    cal.appendChild(cell);
  }
}

render();
</script>

</body>
</html>
